apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-frontend-deployment
spec:
  selector:
    matchLabels:
      app: react-frontend
  replicas: 1
  template:
    metadata:
      labels:
        app: react-frontend
    spec:
      containers:
        - name: react-frontend
          image: react-frontend-k8s:1.0
          imagePullPolicy: Never
          env:
            - name: BACKEND_HOST
              value: springboot-crud-svc
            - name: BACKEND_PORT
              value: "9090"
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: react-frontend-svc
spec:
  selector:
    app: react-frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 80
      nodePort: 30030
  type: NodePort
