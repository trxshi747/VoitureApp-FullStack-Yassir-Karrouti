apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-crud-deployment
spec:
  selector:
    matchLabels:
      app: springboot-k8s-mysql
  strategy:
    type: Recreate
  replicas: 3
  template:
    metadata:
      labels:
        app: springboot-k8s-mysql
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until nc -z mysql 3306; do echo "Waiting for mysql..."; sleep 5; done
      containers:
        - name: springboot-crud-k8s
          image: springboot-crud-k8s:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          startupProbe:
            httpGet:
              path: /voitures
              port: 8082
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /voitures
              port: 8082
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /voitures
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
          env:
            - name: SERVER_PORT
              value: "8082"
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: host
            - name: MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: port
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: dbName
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secrets
                  key: username
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secrets
                  key: password
            - name: OLLAMA_BASE_URL
              value: http://ollama:11434
            - name: OLLAMA_CHAT_MODEL
              value: llama2
---
apiVersion: v1
kind: Service
metadata:
  name: springboot-crud-svc
spec:
  selector:
    app: springboot-k8s-mysql
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 8082
      nodePort: 30090
  type: NodePort
